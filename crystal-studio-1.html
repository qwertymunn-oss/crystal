<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>慕白工作室</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f2f2f7;
    --bg3: #e5e5ea;
    --label: #000000;
    --label2: #3c3c43;
    --label3: #8e8e93;
    --label4: #c7c7cc;
    --sep: rgba(60,60,67,0.12);
    --blue: #007aff;
    --green: #34c759;
    --orange: #ff9500;
    --red: #ff3b30;
    --r: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg2);
    color: var(--label);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── PORTRAIT layout ── */
  .app {
    max-width: 430px;
    margin: 0 auto;
    padding: 0 0 48px;
    min-height: 100vh;
  }

  .header {
    padding: 16px 20px 12px;
  }
  .header-eyebrow {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; color: var(--label3);
    text-transform: uppercase; margin-bottom: 2px;
  }
  .header-title {
    font-size: 34px; font-weight: 700;
    letter-spacing: -0.5px; line-height: 1.1;
  }
  .header-meta { display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .header-date { font-size:13px; color:var(--label3); }
  .sync-pill {
    display:inline-flex; align-items:center; gap:4px;
    background:var(--bg3); border-radius:20px;
    padding:2px 8px; font-size:11px; font-weight:600;
    color:var(--label3); transition:all 0.3s;
  }
  .sync-pill.ok { background:rgba(52,199,89,0.12); color:var(--green); }
  .sync-pill.err { background:rgba(255,59,48,0.1); color:var(--red); }
  .sync-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

  /* Cards */
  .card {
    background:var(--bg); border-radius:var(--r);
    box-shadow:0 1px 0 var(--sep), 0 2px 10px rgba(0,0,0,0.04);
    overflow:hidden;
  }
  .mx { margin:0 16px; }
  .mt { margin-top:10px; }
  .mt-sm { margin-top:6px; }

  /* Mode card */
  .timer-bar {
    padding:14px 20px 10px;
    border-bottom:1px solid var(--sep);
    display:none;
    animation:fd 0.3s ease;
  }
  .timer-bar.visible { display:block; }
  @keyframes fd { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .timer-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
  .timer-label.s { color:var(--blue); }
  .timer-label.o { color:var(--orange); }
  .timer-value { font-size:52px; font-weight:200; letter-spacing:-3px; line-height:1; font-variant-numeric:tabular-nums; }
  .timer-value.s { color:var(--blue); }
  .timer-value.o { color:var(--orange); }

  .mode-btns { display:grid; grid-template-columns:1fr 1fr; }
  .mode-btn {
    padding:18px 16px; display:flex; flex-direction:column;
    align-items:flex-start; gap:5px; cursor:pointer;
    border:none; background:transparent;
    transition:background 0.12s; position:relative;
  }
  .mode-btn:first-child { border-right:1px solid var(--sep); }
  .mode-btn:active { background:var(--bg2); }
  .btn-icon-wrap {
    width:44px; height:44px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:all 0.2s cubic-bezier(0.34,1.5,0.64,1);
  }
  .si { background:rgba(0,122,255,0.1); }
  .oi { background:rgba(255,149,0,0.1); }
  .mode-btn.as .si { background:var(--blue); transform:scale(1.08); box-shadow:0 4px 14px rgba(0,122,255,0.35); }
  .mode-btn.ao .oi { background:var(--orange); transform:scale(1.08); box-shadow:0 4px 14px rgba(255,149,0,0.35); }
  .btn-name { font-size:15px; font-weight:600; }
  .btn-status { font-size:12px; color:var(--label3); }
  .mode-btn.as .btn-name { color:var(--blue); }
  .mode-btn.ao .btn-name { color:var(--orange); }
  .active-dot {
    position:absolute; top:14px; right:14px;
    width:8px; height:8px; border-radius:50%; display:none;
  }
  .mode-btn.as .active-dot { display:block; background:var(--blue); animation:blink 2s infinite; }
  .mode-btn.ao .active-dot { display:block; background:var(--orange); animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* Stats grid */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-card { background:var(--bg); border-radius:var(--r); padding:16px; box-shadow:0 1px 0 var(--sep),0 2px 8px rgba(0,0,0,0.04); }
  .stat-label { font-size:12px; font-weight:500; color:var(--label3); margin-bottom:5px; }
  .stat-val { font-size:24px; font-weight:700; letter-spacing:-0.5px; font-variant-numeric:tabular-nums; }
  .stat-sub { font-size:11px; color:var(--label4); margin-top:2px; }
  .c-blue { color:var(--blue); }
  .c-orange { color:var(--orange); }
  .c-green { color:var(--green); }
  .c-label { color:var(--label); }

  /* Progress */
  .prog-card { background:var(--bg); border-radius:var(--r); padding:16px; box-shadow:0 1px 0 var(--sep),0 2px 8px rgba(0,0,0,0.04); }
  .prog-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .prog-title { font-size:13px; font-weight:600; color:var(--label2); }
  .prog-pct { font-size:13px; font-weight:700; color:var(--blue); }
  .prog-track { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; }
  .prog-fill { height:100%; border-radius:2px; background:var(--blue); transition:width 0.5s cubic-bezier(0.4,0,0.2,1); width:0%; }
  .prog-fill.over { background:var(--green); }

  /* Section header */
  .sec-header { font-size:13px; font-weight:600; color:var(--label3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; padding:0 4px; }

  /* List rows */
  .list-row {
    display:flex; align-items:center; padding:13px 16px;
    border-bottom:1px solid var(--sep); gap:12px;
  }
  .list-row:last-child { border-bottom:none; }
  .row-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .row-label { font-size:15px; color:var(--label); flex:1; }
  .row-input {
    flex:1; border:none; outline:none;
    font-size:15px; font-family:inherit;
    color:var(--label); background:transparent;
    text-align:right; -webkit-appearance:none; min-width:0;
  }
  .row-input::placeholder { color:var(--label4); }
  textarea.row-input { text-align:left; height:72px; line-height:1.5; resize:none; padding:2px 0; }
  .row-unit { font-size:15px; color:var(--label3); margin-left:4px; }
  .profit-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 16px;
    background:rgba(52,199,89,0.06);
  }
  .profit-lbl { font-size:15px; font-weight:500; color:var(--green); }
  .profit-val { font-size:22px; font-weight:700; color:var(--green); letter-spacing:-0.5px; }

  /* Save btn */
  .save-btn {
    display:block; width:calc(100% - 32px);
    margin:12px 16px 0; padding:16px;
    background:var(--blue); color:#fff; border:none;
    border-radius:var(--r); font-size:17px; font-weight:600;
    font-family:inherit; cursor:pointer;
    box-shadow:0 4px 16px rgba(0,122,255,0.28);
    transition:opacity 0.15s, transform 0.15s;
  }
  .save-btn:active { opacity:0.8; transform:scale(0.98); }

  /* Weekly */
  .week-chart { display:flex; align-items:flex-end; gap:6px; height:56px; padding:0 2px; margin-top:10px; }
  .wk-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .wk-bars { display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:1px; height:44px; width:100%; }
  .wk-o { width:100%; background:rgba(255,149,0,0.3); }
  .wk-s { width:100%; border-radius:3px 3px 0 0; background:var(--bg3); }
  .wk-s.today { background:var(--blue); }
  .wk-day { font-size:9px; font-weight:600; color:var(--label4); letter-spacing:0.5px; }
  .wk-day.today { color:var(--blue); }

  /* History */
  .history-item {
    background:var(--bg); border-radius:var(--r);
    margin-bottom:10px; overflow:hidden;
    box-shadow:0 1px 0 var(--sep),0 2px 8px rgba(0,0,0,0.04);
    animation:fu 0.25s ease;
  }
  @keyframes fu { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .hi-top { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; }
  .hi-date { font-size:15px; font-weight:600; }
  .hi-badges { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
  .badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; }
  .bg { background:rgba(52,199,89,0.1); color:var(--green); }
  .br { background:rgba(255,59,48,0.08); color:var(--red); }
  .bgr { background:var(--bg3); color:var(--label3); }
  .hi-times { display:flex; border-top:1px solid var(--sep); }
  .hi-t { flex:1; padding:10px 16px; border-right:1px solid var(--sep); }
  .hi-t:last-child { border-right:none; }
  .hi-t-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--label4); margin-bottom:2px; }
  .hi-t-val { font-size:15px; font-weight:600; }
  .hi-notes { padding:10px 16px 14px; font-size:14px; color:var(--label3); line-height:1.6; border-top:1px solid var(--sep); white-space:pre-wrap; }
  .empty { text-align:center; padding:32px 0; color:var(--label4); font-size:14px; }

  /* ── LANDSCAPE layout ── */
  @media (orientation: landscape) {
    body { overflow:hidden; height:100vh; }
    .app {
      max-width:100%;
      display:grid;
      grid-template-columns:320px 1fr;
      grid-template-rows:auto 1fr;
      height:100vh;
      overflow:hidden;
      padding:0;
    }

    /* Header spans full width */
    .header {
      grid-column: 1 / -1;
      padding:10px 20px 8px;
      border-bottom:1px solid var(--sep);
      background:var(--bg2);
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:8px;
    }
    .header-left { display:flex; align-items:baseline; gap:12px; }
    .header-eyebrow { font-size:10px; margin-bottom:0; }
    .header-title { font-size:22px; }
    .header-meta { margin-top:0; }

    /* Left column: mode + stats */
    .left-col {
      grid-column:1;
      grid-row:2;
      overflow-y:auto;
      padding:12px 12px 24px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      border-right:1px solid var(--sep);
    }

    /* Right column: inputs + history */
    .right-col {
      grid-column:2;
      grid-row:2;
      overflow-y:auto;
      padding:12px 16px 24px 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    /* Tighter sizing in landscape */
    .timer-value { font-size:40px; }
    .stat-val { font-size:20px; }
    .mode-btn { padding:14px 14px; }
    .btn-icon-wrap { width:38px; height:38px; }
    .prog-card { padding:12px; }
    .stat-card { padding:12px; }
    .save-btn { margin:0; width:100%; }
    .mx { margin:0; }
    .mt { margin-top:0; }
  }

  /* ── Setup sheet ── */
  .setup {
    position:fixed; inset:0; background:rgba(0,0,0,0.4);
    z-index:300; display:flex; align-items:flex-end;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .setup-sheet {
    background:var(--bg); border-radius:20px 20px 0 0;
    padding:20px 20px 40px; width:100%; max-width:500px; margin:0 auto;
    animation:su 0.35s cubic-bezier(0.34,1.1,0.64,1);
  }
  @keyframes su { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .setup-handle { width:36px; height:4px; background:var(--bg3); border-radius:2px; margin:0 auto 18px; }
  .setup-title { font-size:20px; font-weight:700; margin-bottom:6px; }
  .setup-sub { font-size:14px; color:var(--label3); line-height:1.7; margin-bottom:18px; }
  .setup-sub a { color:var(--blue); }
  .setup-input { display:block; width:100%; background:var(--bg2); border:none; border-radius:10px; padding:13px 14px; font-size:15px; font-family:inherit; color:var(--label); outline:none; margin-bottom:10px; }
  .setup-ok { width:100%; padding:15px; background:var(--blue); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; }
  .setup-skip { display:block; text-align:center; margin-top:14px; font-size:15px; color:var(--blue); cursor:pointer; }

  /* Toast */
  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(12px);
    background:rgba(0,0,0,0.76); backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px); color:#fff;
    padding:10px 20px; border-radius:20px;
    font-size:14px; font-weight:500;
    opacity:0; transition:all 0.28s cubic-bezier(0.34,1.3,0.64,1);
    pointer-events:none; z-index:400; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="setup" id="setupScreen">
  <div class="setup-sheet">
    <div class="setup-handle"></div>
    <div class="setup-title">云端同步设置</div>
    <div class="setup-sub">
      输入 Firebase Realtime Database 地址，魅蓝、Pixel、iPhone 数据全部同步。<br>
      获取：<a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → 项目 → Realtime Database → 复制顶部网址
    </div>
    <input class="setup-input" id="setupUrl" type="url" placeholder="https://你的项目-default-rtdb.firebaseio.com">
    <button class="setup-ok" onclick="saveSetup()">开始使用</button>
    <span class="setup-skip" onclick="skipSetup()">暂时跳过</span>
  </div>
</div>

<!-- Portrait: flat stack. Landscape: grid via JS-injected wrappers -->
<div class="app" id="app">

  <div class="header" id="header">
    <div class="header-left" id="headerLeft">
      <div>
        <div class="header-eyebrow">Mubai Studio</div>
        <div class="header-title">慕白工作室</div>
      </div>
    </div>
    <div class="header-meta">
      <div class="header-date" id="headerDate"></div>
      <div class="sync-pill" id="syncPill">
        <div class="sync-dot"></div>
        <span id="syncText">连接中</span>
      </div>
    </div>
  </div>

  <!-- These sections get moved into left/right cols in landscape -->
  <div id="sec-mode" class="mx mt">
    <div class="card" id="modeCard">
      <div class="timer-bar" id="timerBar">
        <div class="timer-label" id="timerLabel">工作室</div>
        <div class="timer-value" id="timerValue">00:00:00</div>
      </div>
      <div class="mode-btns">
        <button class="mode-btn" id="studioBtn" onclick="toggleMode('studio')">
          <div class="active-dot"></div>
          <div class="btn-icon-wrap si">🔮</div>
          <div class="btn-name">工作室</div>
          <div class="btn-status" id="sStat">点击开始</div>
        </button>
        <button class="mode-btn" id="outingBtn" onclick="toggleMode('outing')">
          <div class="active-dot"></div>
          <div class="btn-icon-wrap oi">🛍️</div>
          <div class="btn-name">出门进货</div>
          <div class="btn-status" id="oStat">点击开始</div>
        </button>
      </div>
    </div>
  </div>

  <div id="sec-stats" class="mt">
    <div class="stats-grid mx">
      <div class="stat-card"><div class="stat-label">工作室时长</div><div class="stat-val c-blue" id="sStudio">0h 0m</div><div class="stat-sub">今日</div></div>
      <div class="stat-card"><div class="stat-label">出门进货</div><div class="stat-val c-orange" id="sOuting">0h 0m</div><div class="stat-sub">今日</div></div>
      <div class="stat-card"><div class="stat-label">今日总时长</div><div class="stat-val c-label" id="sTotal">0h 0m</div><div class="stat-sub">合计</div></div>
      <div class="stat-card"><div class="stat-label">本周利润</div><div class="stat-val c-green" id="sWeekProfit">¥0</div><div class="stat-sub">本周</div></div>
    </div>
  </div>

  <div id="sec-progress" class="mx mt">
    <div class="prog-card">
      <div class="prog-head">
        <div class="prog-title">今日目标 · 8小时</div>
        <div class="prog-pct" id="progressPct">0%</div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div id="sec-revenue" class="mt">
    <div class="mx"><div class="sec-header">今日效益</div></div>
    <div class="card mx">
      <div class="list-row">
        <div class="row-icon" style="background:rgba(52,199,89,0.1)">💰</div>
        <div class="row-label">销售额</div>
        <input class="row-input" type="number" id="salesInput" placeholder="0" oninput="calcProfit()">
        <div class="row-unit">元</div>
      </div>
      <div class="list-row">
        <div class="row-icon" style="background:rgba(0,122,255,0.08)">📊</div>
        <div class="row-label">利润率</div>
        <input class="row-input" type="number" id="profitRate" value="60" min="1" max="100" oninput="calcProfit()">
        <div class="row-unit">%</div>
      </div>
      <div class="profit-row">
        <div class="profit-lbl">今日净利润</div>
        <div class="profit-val" id="profitDisplay">—</div>
      </div>
    </div>
  </div>

  <div id="sec-notes" class="mt">
    <div class="mx"><div class="sec-header">今天做了什么</div></div>
    <div class="card mx">
      <div class="list-row" style="align-items:flex-start;padding-top:14px;padding-bottom:14px;">
        <div class="row-icon" style="background:rgba(255,149,0,0.1);margin-top:2px;">📝</div>
        <textarea class="row-input" id="notesInput" placeholder="制作了什么、接了什么单、进货情况……"></textarea>
      </div>
    </div>
  </div>

  <div id="sec-save">
    <button class="save-btn" onclick="saveToday()">保存今日记录</button>
  </div>

  <div id="sec-weekly" class="mt">
    <div class="mx"><div class="sec-header">本周工时</div></div>
    <div class="card mx" style="padding:14px 16px;">
      <div class="week-chart" id="weeklyBar"></div>
    </div>
  </div>

  <div id="sec-history" class="mt">
    <div class="mx"><div class="sec-header">过往记录</div></div>
    <div class="mx" id="historyList"></div>
  </div>

</div><!-- .app -->

<div class="toast" id="toast"></div>

<script>
const GOAL = 8 * 3600000;
const LOCAL = 'mubai_v5';
const CFG = 'mubai_cfg';

let state = { mode:null, startTime:null, studioMs:0, outingMs:0 };
let records = [];
let ticker = null;
let dbUrl = '';
let useCloud = false;

// ── Landscape layout ──
function applyLayout() {
  const app = document.getElementById('app');
  const isLandscape = window.innerWidth > window.innerHeight;

  // Remove old wrappers
  const oldL = document.getElementById('leftCol');
  const oldR = document.getElementById('rightCol');
  if (oldL) { while(oldL.firstChild) app.appendChild(oldL.firstChild); oldL.remove(); }
  if (oldR) { while(oldR.firstChild) app.appendChild(oldR.firstChild); oldR.remove(); }

  if (isLandscape) {
    const left = document.createElement('div');
    left.id = 'leftCol'; left.className = 'left-col';
    const right = document.createElement('div');
    right.id = 'rightCol'; right.className = 'right-col';

    ['sec-mode','sec-stats','sec-progress'].forEach(id => left.appendChild(document.getElementById(id)));
    ['sec-revenue','sec-notes','sec-save','sec-weekly','sec-history'].forEach(id => right.appendChild(document.getElementById(id)));

    app.appendChild(left);
    app.appendChild(right);
  }
}

window.addEventListener('resize', applyLayout);
window.addEventListener('orientationchange', () => setTimeout(applyLayout, 200));

// ── Setup ──
function checkSetup() {
  try {
    const cfg = localStorage.getItem(CFG);
    if (cfg) {
      const c = JSON.parse(cfg);
      document.getElementById('setupScreen').style.display = 'none';
      if (c.url) { dbUrl=c.url; useCloud=true; setSyncPill('ok'); loadFromCloud(); }
      else setSyncPill('local');
    }
  } catch(e) {}
}
function saveSetup() {
  const url = document.getElementById('setupUrl').value.trim().replace(/\/$/,'');
  if (!url.includes('firebaseio.com')) { showToast('网址格式不对'); return; }
  dbUrl=url; useCloud=true;
  localStorage.setItem(CFG, JSON.stringify({url}));
  document.getElementById('setupScreen').style.display='none';
  setSyncPill('ok'); loadFromCloud();
}
function skipSetup() {
  localStorage.setItem(CFG, JSON.stringify({url:''}));
  document.getElementById('setupScreen').style.display='none';
  setSyncPill('local');
}
function setSyncPill(s) {
  const p=document.getElementById('syncPill'), t=document.getElementById('syncText');
  p.className='sync-pill'+(s==='ok'?' ok':s==='err'?' err':'');
  t.textContent=s==='ok'?'云端已连接':s==='err'?'同步失败':s==='local'?'本地存储':'连接中';
}

// ── Firebase REST ──
async function fbGet(path) {
  const r=await fetch(`${dbUrl}/${path}.json`); if(!r.ok)throw new Error(); return r.json();
}
async function fbSet(path,data) {
  const r=await fetch(`${dbUrl}/${path}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); if(!r.ok)throw new Error();
}
async function loadFromCloud() {
  if(!useCloud)return;
  try {
    const data=await fbGet('mubai/records');
    if(data){records=Object.values(data).sort((a,b)=>b.date.localeCompare(a.date));saveLocal();renderAll();}
    const s=await fbGet(`mubai/state/${todayKey()}`);
    if(s&&!state.mode&&s.date===todayKey()){state.studioMs=s.studioMs||0;state.outingMs=s.outingMs||0;updateStatsDisplay();}
    setSyncPill('ok');
  } catch(e){setSyncPill('err');}
}
async function pushRecord(rec) {
  if(!useCloud)return;
  try{await fbSet(`mubai/records/${rec.date}`,rec);setSyncPill('ok');}catch(e){setSyncPill('err');}
}
async function pushState() {
  if(!useCloud)return;
  try{await fbSet(`mubai/state/${todayKey()}`,{studioMs:state.studioMs,outingMs:state.outingMs,date:todayKey(),t:Date.now()});}catch(e){}
}

// ── Local ──
function loadLocal(){try{const d=localStorage.getItem(LOCAL);if(d){const p=JSON.parse(d);records=p.records||[];}}catch(e){}}
function saveLocal(){localStorage.setItem(LOCAL,JSON.stringify({records}));}

// ── Helpers ──
function todayKey(){return new Date().toISOString().slice(0,10);}
function fmtMs(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function fmtHM(ms){const m=Math.floor(ms/60000);return`${Math.floor(m/60)}h ${m%60}m`;}
function getTotals(){
  let s=state.studioMs,o=state.outingMs;
  if(state.mode&&state.startTime){const e=Date.now()-new Date(state.startTime).getTime();if(state.mode==='studio')s+=e;else o+=e;}
  return{s,o,t:s+o};
}

// ── Mode ──
function toggleMode(mode){
  const now=Date.now();
  if(state.mode===mode){
    const e=now-new Date(state.startTime).getTime();
    if(mode==='studio')state.studioMs+=e;else state.outingMs+=e;
    state.mode=null;state.startTime=null;
    clearInterval(ticker);ticker=null;
    pushState();
    showToast(mode==='studio'?'工作室结束 ✓':'进货结束 ✓');
  } else {
    if(state.mode&&state.startTime){const e=now-new Date(state.startTime).getTime();if(state.mode==='studio')state.studioMs+=e;else state.outingMs+=e;}
    state.mode=mode;state.startTime=new Date(now);
    clearInterval(ticker);ticker=setInterval(tick,1000);
    showToast(mode==='studio'?'工作室打卡 🔮':'出门进货打卡 🛍️');
  }
  updateModeUI();updateStatsDisplay();
}
function tick(){
  const e=Date.now()-new Date(state.startTime).getTime();
  document.getElementById('timerValue').textContent=fmtMs(e);
  updateStatsDisplay();
}
function updateModeUI(){
  const sb=document.getElementById('studioBtn'),ob=document.getElementById('outingBtn');
  const tb=document.getElementById('timerBar'),tl=document.getElementById('timerLabel'),tv=document.getElementById('timerValue');
  sb.className='mode-btn'+(state.mode==='studio'?' as':'');
  ob.className='mode-btn'+(state.mode==='outing'?' ao':'');
  if(state.mode){
    tb.className='timer-bar visible';
    tl.className='timer-label '+(state.mode==='studio'?'s':'o');
    tv.className='timer-value '+(state.mode==='studio'?'s':'o');
    tl.textContent=state.mode==='studio'?'工作室进行中':'出门进货中';
    document.getElementById('sStat').textContent=state.mode==='studio'?'点击结束':'点击开始';
    document.getElementById('oStat').textContent=state.mode==='outing'?'点击结束':'点击开始';
  } else {
    tb.className='timer-bar';
    document.getElementById('sStat').textContent='点击开始';
    document.getElementById('oStat').textContent='点击开始';
  }
}
function updateStatsDisplay(){
  const{s,o,t}=getTotals();
  document.getElementById('sStudio').textContent=fmtHM(s);
  document.getElementById('sOuting').textContent=fmtHM(o);
  document.getElementById('sTotal').textContent=fmtHM(t);
  const pct=Math.min((s/GOAL)*100,100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressFill').className='prog-fill'+(pct>=100?' over':'');
  document.getElementById('progressPct').textContent=Math.round(pct)+'%';
}
function updateWeekProfit(){
  const now=new Date(),ws=new Date(now);
  ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  let p=0;records.forEach(r=>{if(new Date(r.date)>=ws)p+=(r.profit||0);});
  document.getElementById('sWeekProfit').textContent=`¥${p.toFixed(0)}`;
}
function calcProfit(){
  const v=parseFloat(document.getElementById('salesInput').value)||0;
  const r=parseFloat(document.getElementById('profitRate').value)||60;
  document.getElementById('profitDisplay').textContent=v>0?`¥${(v*r/100).toFixed(0)}`:'—';
}
async function saveToday(){
  const key=todayKey();
  const sales=parseFloat(document.getElementById('salesInput').value)||0;
  const rate=parseFloat(document.getElementById('profitRate').value)||60;
  const{s,o,t}=getTotals();
  const notes=document.getElementById('notesInput').value.trim();
  if(t<60000&&sales===0&&!notes){showToast('请先打卡或填写内容');return;}
  const rec={date:key,studioMs:s,outingMs:o,totalMs:t,sales,profit:sales*rate/100,profitRate:rate,notes,savedAt:new Date().toISOString()};
  const i=records.findIndex(r=>r.date===key);
  if(i>=0)records[i]=rec;else records.unshift(rec);
  saveLocal();await pushRecord(rec);renderAll();showToast('已保存 ✓');
}
function renderWeekly(){
  const now=new Date(),dn=['日','一','二','三','四','五','六'];
  const c=document.getElementById('weeklyBar');c.innerHTML='';
  let maxH=GOAL/3600000;
  const cols=[];
  for(let i=6;i>=0;i--){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const rec=records.find(r=>r.date===key);
    let s=0,o=0;
    if(rec){s=rec.studioMs||0;o=rec.outingMs||0;}
    else if(key===todayKey()){const t=getTotals();s=t.s;o=t.o;}
    const tot=(s+o)/3600000;if(tot>maxH)maxH=tot;
    cols.push({day:dn[d.getDay()],s:s/3600000,o:o/3600000,isToday:i===0});
  }
  cols.forEach(col=>{
    const scale=Math.max(maxH,GOAL/3600000);
    const sh=Math.max((col.s/scale)*40,col.s>0?3:0);
    const oh=Math.max((col.o/scale)*40,col.o>0?3:0);
    const div=document.createElement('div');div.className='wk-col';
    div.innerHTML=`<div class="wk-bars">
      ${oh>0?`<div class="wk-o" style="height:${oh}px;border-radius:3px 3px 0 0"></div>`:''}
      <div class="wk-s${col.isToday?' today':''}" style="height:${Math.max(sh,2)}px"></div>
    </div><div class="wk-day${col.isToday?' today':''}">${col.day}</div>`;
    c.appendChild(div);
  });
}
function renderHistory(){
  const list=document.getElementById('historyList');
  if(!records.length){list.innerHTML='<div class="empty">暂无记录</div>';return;}
  list.innerHTML='';
  records.slice(0,14).forEach(r=>{
    const d=new Date(r.date),ds=`${d.getMonth()+1}月${d.getDate()}日`;
    const s=r.studioMs||r.ms||0,o=r.outingMs||0,t=s+o;
    const hit=s>=GOAL;
    const div=document.createElement('div');div.className='history-item';
    let timesHtml='';
    if(s>0||o>0){
      timesHtml=`<div class="hi-times">
        ${s>0?`<div class="hi-t"><div class="hi-t-lbl">工作室</div><div class="hi-t-val c-blue">${fmtHM(s)}</div></div>`:''}
        ${o>0?`<div class="hi-t"><div class="hi-t-lbl">进货</div><div class="hi-t-val c-orange">${fmtHM(o)}</div></div>`:''}
        ${r.profit>0?`<div class="hi-t"><div class="hi-t-lbl">利润</div><div class="hi-t-val c-green">¥${r.profit.toFixed(0)}</div></div>`:''}
      </div>`;
    }
    div.innerHTML=`<div class="hi-top">
      <div class="hi-date">${ds}</div>
      <div class="hi-badges">
        ${t>0?`<span class="badge ${hit?'bg':'br'}">${hit?'达标':'未达标'}</span>`:''}
        ${r.sales>0?`<span class="badge bgr">${r.profitRate}%</span>`:''}
      </div></div>
      ${timesHtml}
      ${r.notes?`<div class="hi-notes">${r.notes}</div>`:''}`;
    list.appendChild(div);
  });
}
function renderAll(){renderHistory();updateWeekProfit();renderWeekly();updateStatsDisplay();}
function updateHeaderDate(){
  const d=new Date(),days=['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${days[d.getDay()]}`;
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

// ── Date reset check ──
let _lastDate = todayKey();
function checkDateReset(){
  const today=todayKey();
  if(today!==_lastDate){
    _lastDate=today;
    if(state.mode){clearInterval(ticker);ticker=null;}
    state.mode=null;state.startTime=null;state.studioMs=0;state.outingMs=0;
    updateModeUI();updateStatsDisplay();updateHeaderDate();renderAll();
  }
}
setInterval(checkDateReset,60000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden)checkDateReset();});

// ── Boot ──
updateHeaderDate();
checkSetup();
loadLocal();
renderAll();
applyLayout();
</script>
</body>
</html>
